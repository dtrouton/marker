name: MDMgr
options:
  bundleIdPrefix: com.mdmgr
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

targets:
  MDMgr:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - QuickLookExtension/**
    resources:
      - path: Resources
    dependencies:
      - target: MarkerQuickLook
    settings:
      base:
        PRODUCT_NAME: Marker
        PRODUCT_BUNDLE_IDENTIFIER: com.marker.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Sources/App/Info.plist
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""

  MarkerQuickLook:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources/QuickLookExtension
    entitlements:
      path: Sources/QuickLookExtension/MarkerQuickLook.entitlements
    settings:
      base:
        PRODUCT_NAME: MarkerQuickLook
        PRODUCT_BUNDLE_IDENTIFIER: com.marker.app.quicklook
        INFOPLIST_FILE: Sources/QuickLookExtension/Info.plist
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_ENTITLEMENTS: Sources/QuickLookExtension/MarkerQuickLook.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"

  MDMgrTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: MDMgr
    settings:
      base:
        SWIFT_VERSION: "5.10"
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Marker.app/Contents/MacOS/Marker"
