<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD Mgr Editor</title>
    <style>
        :root {
            --bg: #ffffff; --fg: #1d1d1f; --secondary: #86868b;
            --border: #d2d2d7; --code-bg: #f5f5f7; --accent: #007aff;
            --toolbar-bg: #f5f5f7;
            --line-num-bg: #f5f5f7; --line-num-fg: #b0b0b3;
            --hl-heading: #1a6dcc; --hl-bold: #1d1d1f; --hl-italic: #7d4e9f;
            --hl-code: #c7254e; --hl-code-bg: rgba(135,131,120,0.1);
            --hl-link: #007aff; --hl-list: #e67e22; --hl-quote: #86868b;
            --hl-hr: #d2d2d7;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1d1d1f; --fg: #f5f5f7; --secondary: #86868b;
                --border: #424245; --code-bg: #2c2c2e; --accent: #0a84ff;
                --toolbar-bg: #2c2c2e;
                --line-num-bg: #2c2c2e; --line-num-fg: #555558;
                --hl-heading: #6cb6ff; --hl-bold: #f5f5f7; --hl-italic: #d2a8ff;
                --hl-code: #ff7b72; --hl-code-bg: rgba(110,118,129,0.2);
                --hl-link: #58a6ff; --hl-list: #f0883e; --hl-quote: #86868b;
                --hl-hr: #424245;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
               font-size: 15px; line-height: 1.6; color: var(--fg); background: var(--bg); }
        .hidden { display: none !important; }
        .toolbar { position: sticky; top: 0; z-index: 10; display: flex; align-items: center;
                   gap: 2px; padding: 4px 8px; background: var(--toolbar-bg);
                   border-bottom: 1px solid var(--border); }
        .toolbar button { background: none; border: 1px solid transparent; border-radius: 4px;
                          padding: 4px 8px; font-size: 13px; color: var(--fg); cursor: pointer;
                          min-width: 28px; text-align: center; }
        .toolbar button:hover { background: var(--border); }
        .toolbar .separator { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
        .reader { padding: 24px 32px; max-width: 800px; margin: 0 auto; }
        .reader h1 { font-size: 2em; margin: 0.8em 0 0.4em; font-weight: 700; }
        .reader h2 { font-size: 1.5em; margin: 0.8em 0 0.4em; font-weight: 600; }
        .reader h3 { font-size: 1.2em; margin: 0.8em 0 0.4em; font-weight: 600; }
        .reader h4 { font-size: 1em; margin: 0.8em 0 0.4em; font-weight: 600; }
        .reader p { margin: 0.6em 0; }
        .reader a { color: var(--accent); text-decoration: none; }
        .reader a:hover { text-decoration: underline; }
        .reader code { font-family: 'SF Mono', Menlo, monospace; font-size: 0.9em;
                       background: var(--code-bg); padding: 2px 6px; border-radius: 4px; }
        .reader pre { background: var(--code-bg); border-radius: 8px; padding: 16px;
                      overflow-x: auto; margin: 1em 0; }
        .reader pre code { background: none; padding: 0; font-size: 13px; line-height: 1.5; }
        .reader blockquote { border-left: 3px solid var(--accent); padding-left: 16px;
                             color: var(--secondary); margin: 1em 0; }
        .reader table { border-collapse: collapse; margin: 1em 0; width: 100%; }
        .reader th, .reader td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
        .reader th { background: var(--code-bg); font-weight: 600; }
        .reader ul, .reader ol { padding-left: 24px; margin: 0.6em 0; }
        .reader li { margin: 0.3em 0; }
        .reader hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }
        .reader img { max-width: 100%; border-radius: 8px; margin: 1em 0; }

        /* Editor container with line numbers */
        .editor { display: none; }
        .editor-container {
            display: flex; flex-direction: row; min-height: 100vh;
        }
        .line-numbers {
            flex-shrink: 0; width: 48px; padding: 24px 8px 24px 0;
            background: var(--line-num-bg); color: var(--line-num-fg);
            font-family: 'SF Mono', Menlo, monospace; font-size: 14px;
            line-height: 1.6; text-align: right; user-select: none;
            border-right: 1px solid var(--border); overflow: hidden;
        }
        .line-numbers div {
            height: calc(14px * 1.6);
        }
        .edit-wrap {
            flex: 1; position: relative; overflow: auto;
            padding: 24px 32px 24px 16px; max-width: calc(800px - 48px);
        }
        .edit-wrap pre.highlight-layer,
        .edit-wrap textarea.edit-area {
            font-family: 'SF Mono', Menlo, monospace; font-size: 14px;
            line-height: 1.6; margin: 0; padding: 0; border: none;
            white-space: pre-wrap; word-wrap: break-word;
            width: 100%; min-height: 80vh;
            overflow: hidden;
        }
        .edit-wrap pre.highlight-layer {
            position: absolute; top: 24px; left: 16px; right: 32px;
            pointer-events: none; color: transparent;
            z-index: 1;
        }
        .edit-wrap textarea.edit-area {
            position: relative; z-index: 2;
            color: transparent; caret-color: var(--fg);
            background: transparent; outline: none; resize: none;
            -webkit-text-fill-color: transparent;
        }

        /* Syntax highlight classes */
        .hl-heading { color: var(--hl-heading); font-weight: 700; }
        .hl-bold { color: var(--hl-bold); font-weight: 700; }
        .hl-italic { color: var(--hl-italic); font-style: italic; }
        .hl-bold-italic { color: var(--hl-bold); font-weight: 700; font-style: italic; }
        .hl-code { color: var(--hl-code); background: var(--hl-code-bg); border-radius: 3px; }
        .hl-code-block { color: var(--hl-code); }
        .hl-link { color: var(--hl-link); }
        .hl-link-url { color: var(--hl-link); opacity: 0.6; }
        .hl-list { color: var(--hl-list); font-weight: 600; }
        .hl-quote { color: var(--hl-quote); }
        .hl-hr { color: var(--hl-hr); }
    </style>
</head>
<body>
    <div id="toolbar" class="toolbar hidden">
        <button data-action="bold" title="Bold"><b>B</b></button>
        <button data-action="italic" title="Italic"><i>I</i></button>
        <span class="separator"></span>
        <button data-action="h1">H1</button>
        <button data-action="h2">H2</button>
        <button data-action="h3">H3</button>
        <span class="separator"></span>
        <button data-action="bullet">&#8226;</button>
        <button data-action="ordered">1.</button>
        <span class="separator"></span>
        <button data-action="code">&lt;/&gt;</button>
        <button data-action="quote">&ldquo;</button>
        <button data-action="link">Link</button>
        <button data-action="hr">&mdash;</button>
    </div>
    <div id="reader" class="reader"></div>
    <div id="editor" class="editor">
        <div class="editor-container">
            <div id="lineNumbers" class="line-numbers"></div>
            <div class="edit-wrap">
                <pre id="highlightLayer" class="highlight-layer"></pre>
                <textarea id="editArea" class="edit-area" spellcheck="true"></textarea>
            </div>
        </div>
    </div>

    <script>
    // Lightweight markdown renderer (no dependencies)
    // Note: innerHTML is used with content from local markdown files only (not user-supplied web content).
    // The app only opens files the user explicitly selects from their local filesystem.
    function renderMarkdown(md) {
        var codeBlocks = [];
        md = md.replace(/```(\w*)\n([\s\S]*?)```/g, function(m, lang, code) {
            var i = codeBlocks.length;
            codeBlocks.push('<pre><code>' + code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</code></pre>');
            return '\x00CB' + i + '\x00';
        });
        var inlineCodes = [];
        md = md.replace(/`([^`]+)`/g, function(m, code) {
            var i = inlineCodes.length;
            inlineCodes.push('<code>' + code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</code>');
            return '\x00IC' + i + '\x00';
        });

        var lines = md.split('\n'), html = [], inList = false, inTable = false;
        for (var idx = 0; idx < lines.length; idx++) {
            var line = lines[idx];
            var cbMatch = line.match(/^\x00CB(\d+)\x00$/);
            if (cbMatch) {
                if (inList) { html.push('</ul>'); inList = false; }
                if (inTable) { html.push('</table>'); inTable = false; }
                html.push(codeBlocks[parseInt(cbMatch[1])]); continue;
            }
            var hMatch = line.match(/^(#{1,6})\s+(.+)$/);
            if (hMatch) {
                if (inList) { html.push('</ul>'); inList = false; }
                if (inTable) { html.push('</table>'); inTable = false; }
                var lv = hMatch[1].length;
                html.push('<h'+lv+'>' + fmt(hMatch[2]) + '</h'+lv+'>'); continue;
            }
            if (/^(---+|\*\*\*+|___+)$/.test(line.trim())) {
                if (inList) { html.push('</ul>'); inList = false; }
                if (inTable) { html.push('</table>'); inTable = false; }
                html.push('<hr>'); continue;
            }
            var bq = line.match(/^>\s*(.*)$/);
            if (bq) {
                if (inList) { html.push('</ul>'); inList = false; }
                if (inTable) { html.push('</table>'); inTable = false; }
                html.push('<blockquote><p>' + fmt(bq[1]) + '</p></blockquote>'); continue;
            }
            if (line.trim().match(/^\|.+\|$/)) {
                if (inList) { html.push('</ul>'); inList = false; }
                if (line.trim().match(/^\|[\s\-:|]+\|$/)) continue;
                if (!inTable) { html.push('<table>'); inTable = true; }
                var cells = line.trim().replace(/^\||\|$/g,'').split('|');
                html.push('<tr>'+cells.map(function(c){return '<td>'+fmt(c.trim())+'</td>';}).join('')+'</tr>'); continue;
            }
            if (inTable) { html.push('</table>'); inTable = false; }
            var li = line.match(/^[-*+]\s+(.+)$/);
            if (li) {
                if (!inList) { html.push('<ul>'); inList = true; }
                var task = li[1].match(/^\[([ x])\]\s+(.+)$/);
                if (task) {
                    var chk = task[1]==='x'?' checked':'';
                    html.push('<li><input type="checkbox"'+chk+' disabled> '+fmt(task[2])+'</li>');
                } else { html.push('<li>'+fmt(li[1])+'</li>'); }
                continue;
            }
            if (inList) { html.push('</ul>'); inList = false; }
            if (!line.trim()) { html.push(''); continue; }
            html.push('<p>' + fmt(line) + '</p>');
        }
        if (inList) html.push('</ul>');
        if (inTable) html.push('</table>');
        var result = html.join('\n');
        result = result.replace(/\x00IC(\d+)\x00/g, function(m,i){return inlineCodes[parseInt(i)];});
        return result;
    }
    function fmt(t) {
        return t
            .replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img alt="$1" src="$2">')
            .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>')
            .replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
            .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
            .replace(/__(.+?)__/g,'<strong>$1</strong>')
            .replace(/\*(.+?)\*/g,'<em>$1</em>')
            .replace(/_([^_]+?)_/g,'<em>$1</em>');
    }

    // ===== Syntax Highlighting for Edit Mode =====
    function escapeHTML(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function highlightMarkdown(text) {
        var lines = text.split('\n');
        var result = [];
        var inCodeBlock = false;

        for (var i = 0; i < lines.length; i++) {
            var line = lines[i];

            // Code block fences
            if (/^```/.test(line)) {
                inCodeBlock = !inCodeBlock;
                result.push('<span class="hl-code-block">' + escapeHTML(line) + '</span>');
                continue;
            }
            if (inCodeBlock) {
                result.push('<span class="hl-code-block">' + escapeHTML(line) + '</span>');
                continue;
            }

            // Headings
            var hm = line.match(/^(#{1,6}\s)(.*)/);
            if (hm) {
                result.push('<span class="hl-heading">' + escapeHTML(hm[1]) + highlightInline(hm[2]) + '</span>');
                continue;
            }

            // Horizontal rules
            if (/^(---+|\*\*\*+|___+)\s*$/.test(line)) {
                result.push('<span class="hl-hr">' + escapeHTML(line) + '</span>');
                continue;
            }

            // Blockquotes
            var bqm = line.match(/^(>\s?)(.*)/);
            if (bqm) {
                result.push('<span class="hl-quote">' + escapeHTML(bqm[1]) + highlightInline(bqm[2]) + '</span>');
                continue;
            }

            // Unordered lists (- * +)
            var ulm = line.match(/^(\s*[-*+]\s)(.*)/);
            if (ulm) {
                result.push('<span class="hl-list">' + escapeHTML(ulm[1]) + '</span>' + highlightInline(ulm[2]));
                continue;
            }

            // Ordered lists
            var olm = line.match(/^(\s*\d+\.\s)(.*)/);
            if (olm) {
                result.push('<span class="hl-list">' + escapeHTML(olm[1]) + '</span>' + highlightInline(olm[2]));
                continue;
            }

            // Normal line with inline formatting
            result.push(highlightInline(line));
        }
        // Ensure trailing newline so pre matches textarea height
        return result.join('\n') + '\n';
    }

    function highlightInline(text) {
        // We process the text character by character to handle overlapping patterns
        // Use a simpler regex-based approach: find and wrap patterns
        var escaped = escapeHTML(text);

        // Inline code (must be first to prevent inner matching)
        escaped = escaped.replace(/`([^`]+)`/g, '<span class="hl-code">`$1`</span>');

        // Bold+italic
        escaped = escaped.replace(/\*\*\*(.+?)\*\*\*/g, '<span class="hl-bold-italic">***$1***</span>');

        // Bold
        escaped = escaped.replace(/\*\*(.+?)\*\*/g, '<span class="hl-bold">**$1**</span>');
        escaped = escaped.replace(/__(.+?)__/g, '<span class="hl-bold">__$1__</span>');

        // Italic
        escaped = escaped.replace(/(?<!\*)\*([^*]+?)\*(?!\*)/g, '<span class="hl-italic">*$1*</span>');
        escaped = escaped.replace(/(?<!_)_([^_]+?)_(?!_)/g, '<span class="hl-italic">_$1_</span>');

        // Images
        escaped = escaped.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,
            '<span class="hl-link">![</span><span class="hl-link">$1</span><span class="hl-link">]</span><span class="hl-link-url">(</span><span class="hl-link-url">$2</span><span class="hl-link-url">)</span>');

        // Links
        escaped = escaped.replace(/\[([^\]]+)\]\(([^)]+)\)/g,
            '<span class="hl-link">[</span><span class="hl-link">$1</span><span class="hl-link">]</span><span class="hl-link-url">(</span><span class="hl-link-url">$2</span><span class="hl-link-url">)</span>');

        return escaped;
    }

    // ===== Line Numbers =====
    function updateLineNumbers(text) {
        var count = text.split('\n').length;
        var nums = [];
        for (var i = 1; i <= count; i++) {
            nums.push('<div>' + i + '</div>');
        }
        lineNumbersEl.innerHTML = nums.join('');
    }

    // ===== Auto-continue Lists =====
    function getCurrentLine(textarea) {
        var val = textarea.value;
        var pos = textarea.selectionStart;
        var lineStart = val.lastIndexOf('\n', pos - 1) + 1;
        return val.substring(lineStart, pos);
    }

    function handleEnterKey(e) {
        var ta = editArea;
        var val = ta.value;
        var pos = ta.selectionStart;
        var endPos = ta.selectionEnd;
        var lineStart = val.lastIndexOf('\n', pos - 1) + 1;
        var currentLine = val.substring(lineStart, pos);

        // Check task list: - [ ] or - [x]
        var taskMatch = currentLine.match(/^(\s*[-*+]\s\[[ x]\]\s)(.*)$/);
        if (taskMatch) {
            if (taskMatch[2].length === 0) {
                // Empty task item - remove prefix and end list
                e.preventDefault();
                ta.setRangeText('\n', lineStart, endPos, 'end');
                notifyChange();
                return;
            }
            e.preventDefault();
            var prefix = currentLine.match(/^(\s*[-*+])\s\[[ x]\]\s/)[1];
            ta.setRangeText('\n' + prefix + ' [ ] ', pos, endPos, 'end');
            notifyChange();
            return;
        }

        // Unordered list: - or * or +
        var ulMatch = currentLine.match(/^(\s*[-*+]\s)(.*)$/);
        if (ulMatch) {
            if (ulMatch[2].length === 0) {
                e.preventDefault();
                ta.setRangeText('\n', lineStart, endPos, 'end');
                notifyChange();
                return;
            }
            e.preventDefault();
            ta.setRangeText('\n' + ulMatch[1], pos, endPos, 'end');
            notifyChange();
            return;
        }

        // Ordered list: N.
        var olMatch = currentLine.match(/^(\s*)(\d+)\.\s(.*)$/);
        if (olMatch) {
            if (olMatch[3].length === 0) {
                e.preventDefault();
                ta.setRangeText('\n', lineStart, endPos, 'end');
                notifyChange();
                return;
            }
            e.preventDefault();
            var nextNum = parseInt(olMatch[2]) + 1;
            ta.setRangeText('\n' + olMatch[1] + nextNum + '. ', pos, endPos, 'end');
            notifyChange();
            return;
        }

        // Blockquote: >
        var bqMatch = currentLine.match(/^(>\s?)(.*)$/);
        if (bqMatch) {
            if (bqMatch[2].length === 0) {
                e.preventDefault();
                ta.setRangeText('\n', lineStart, endPos, 'end');
                notifyChange();
                return;
            }
            e.preventDefault();
            ta.setRangeText('\n> ', pos, endPos, 'end');
            notifyChange();
            return;
        }
    }

    // ===== Undo/Redo Stack =====
    var undoStack = [];
    var redoStack = [];
    var lastSnapshot = null;

    function saveSnapshot() {
        var snap = { text: editArea.value, start: editArea.selectionStart, end: editArea.selectionEnd };
        if (lastSnapshot && lastSnapshot.text === snap.text) return;
        undoStack.push(snap);
        if (undoStack.length > 200) undoStack.shift();
        redoStack = [];
        lastSnapshot = snap;
    }

    function doUndo() {
        if (undoStack.length === 0) return;
        var current = { text: editArea.value, start: editArea.selectionStart, end: editArea.selectionEnd };
        redoStack.push(current);
        var snap = undoStack.pop();
        editArea.value = snap.text;
        editArea.selectionStart = snap.start;
        editArea.selectionEnd = snap.end;
        lastSnapshot = snap;
        notifyChange();
    }

    function doRedo() {
        if (redoStack.length === 0) return;
        var current = { text: editArea.value, start: editArea.selectionStart, end: editArea.selectionEnd };
        undoStack.push(current);
        var snap = redoStack.pop();
        editArea.value = snap.text;
        editArea.selectionStart = snap.start;
        editArea.selectionEnd = snap.end;
        lastSnapshot = snap;
        notifyChange();
    }

    // ===== Tab Handling =====
    function handleTabKey(e) {
        e.preventDefault();
        saveSnapshot();
        var ta = editArea;
        var start = ta.selectionStart;
        var end = ta.selectionEnd;
        ta.setRangeText('    ', start, end, 'end');
        notifyChange();
    }

    // ===== Auto-close Pairs =====
    var lastKeyTime = 0;
    var lastKey = '';

    function handleAutoClose(e) {
        var ta = editArea;
        var pos = ta.selectionStart;
        var end = ta.selectionEnd;
        var val = ta.value;
        var ch = e.key;
        var now = Date.now();

        // Detect double-star: if user just typed * and now types * again within 500ms
        if (ch === '*') {
            var charBefore = pos > 0 ? val[pos - 1] : '';
            // If the previous char is * and it was typed recently, this completes a **
            // We let it type naturally, then on the NEXT tick check if we should auto-close
            // Actually, simpler: after the * is inserted, check if we now have ** at cursor
            // We use setTimeout to run after the default keypress inserts the character
            setTimeout(function() {
                var newVal = ta.value;
                var newPos = ta.selectionStart;
                // Check if the two chars before cursor are **
                if (newPos >= 2 && newVal.substring(newPos - 2, newPos) === '**') {
                    // Check if there's already ** after cursor (don't double-close)
                    if (newVal.substring(newPos, newPos + 2) !== '**') {
                        ta.setRangeText('**', newPos, newPos, 'select');
                        ta.selectionStart = newPos;
                        ta.selectionEnd = newPos;
                        notifyChange();
                    }
                }
            }, 0);
            return; // Don't prevent default, let the * be typed
        }

        if (ch === '`') {
            // Check if we're inside a code block (``` ... ```), skip auto-close
            var before = val.substring(0, pos);
            var fenceCount = (before.match(/^```/gm) || []).length;
            if (fenceCount % 2 === 1) return; // Inside a code block

            e.preventDefault();
            ta.setRangeText('``', pos, end, 'end');
            ta.selectionStart = pos + 1;
            ta.selectionEnd = pos + 1;
            notifyChange();
            return;
        }

        if (ch === '[') {
            e.preventDefault();
            if (pos !== end) {
                // Wrap selection
                var sel = val.substring(pos, end);
                ta.setRangeText('[' + sel + ']', pos, end, 'end');
            } else {
                ta.setRangeText('[]', pos, end, 'end');
                ta.selectionStart = pos + 1;
                ta.selectionEnd = pos + 1;
            }
            notifyChange();
            return;
        }

        if (ch === '(') {
            e.preventDefault();
            if (pos !== end) {
                var sel2 = val.substring(pos, end);
                ta.setRangeText('(' + sel2 + ')', pos, end, 'end');
            } else {
                ta.setRangeText('()', pos, end, 'end');
                ta.selectionStart = pos + 1;
                ta.selectionEnd = pos + 1;
            }
            notifyChange();
            return;
        }

        // Skip over closing characters if the next char is the same
        if (ch === ']' && val[pos] === ']') {
            e.preventDefault();
            ta.selectionStart = pos + 1;
            ta.selectionEnd = pos + 1;
            return;
        }
        if (ch === ')' && val[pos] === ')') {
            e.preventDefault();
            ta.selectionStart = pos + 1;
            ta.selectionEnd = pos + 1;
            return;
        }
    }

    // ===== Bridge =====
    function sendToSwift(type, payload) {
        if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.bridge)
            window.webkit.messageHandlers.bridge.postMessage(JSON.stringify(Object.assign({type:type},payload||{})));
    }
    var handlers = {};
    window.handleSwiftMessage = function(s) {
        var msg = JSON.parse(s);
        if (handlers[msg.type]) handlers[msg.type](msg);
    };

    var readerEl = document.getElementById('reader');
    var editorEl = document.getElementById('editor');
    var editArea = document.getElementById('editArea');
    var toolbarEl = document.getElementById('toolbar');
    var lineNumbersEl = document.getElementById('lineNumbers');
    var highlightLayer = document.getElementById('highlightLayer');
    var currentMode = 'read', currentContent = '';

    function showReader(content) {
        readerEl.textContent = '';
        var div = document.createElement('div');
        // Content is from local files only, rendered through our markdown parser
        div.innerHTML = renderMarkdown(content);
        readerEl.appendChild(div);
        readerEl.classList.remove('hidden');
    }

    function notifyChange() {
        currentContent = editArea.value;
        sendToSwift('contentChanged', {content: currentContent});
        updateHighlight();
        updateLineNumbers(currentContent);
    }

    function updateHighlight() {
        highlightLayer.innerHTML = highlightMarkdown(editArea.value);
    }

    function syncScroll() {
        highlightLayer.scrollTop = editArea.scrollTop;
        highlightLayer.scrollLeft = editArea.scrollLeft;
    }

    handlers['loadContent'] = function(msg) {
        currentContent = msg.content;
        if (currentMode === 'read') showReader(currentContent);
        else {
            editArea.value = currentContent;
            updateHighlight();
            updateLineNumbers(currentContent);
        }
    };
    handlers['setMode'] = function(msg) {
        currentMode = msg.mode;
        if (currentMode === 'read') {
            if (editArea.value) currentContent = editArea.value;
            showReader(currentContent);
            readerEl.classList.remove('hidden');
            editorEl.style.display = 'none';
            toolbarEl.classList.add('hidden');
        } else {
            readerEl.classList.add('hidden');
            editorEl.style.display = 'block';
            toolbarEl.classList.remove('hidden');
            editArea.value = currentContent;
            updateHighlight();
            updateLineNumbers(currentContent);
            editArea.focus();
        }
    };
    handlers['setBaseURL'] = function(msg) {
        var b = document.querySelector('base'); if (b) b.remove();
        b = document.createElement('base'); b.href = msg.url; document.head.prepend(b);
    };
    handlers['getContent'] = function() { sendToSwift('contentResult',{content:currentContent}); };

    // Input handling
    editArea.addEventListener('input', function() {
        notifyChange();
    });

    editArea.addEventListener('scroll', function() {
        syncScroll();
        // Sync line number scroll
        lineNumbersEl.scrollTop = editArea.scrollTop;
    });

    editArea.addEventListener('keydown', function(e) {
        // Undo: Cmd+Z
        if (e.key === 'z' && e.metaKey && !e.shiftKey) {
            e.preventDefault();
            doUndo();
            return;
        }
        // Redo: Cmd+Shift+Z
        if (e.key === 'z' && e.metaKey && e.shiftKey) {
            e.preventDefault();
            doRedo();
            return;
        }
        if (e.key === 'Tab' && !e.shiftKey && !e.metaKey && !e.ctrlKey && !e.altKey) {
            handleTabKey(e);
            return;
        }
        if (e.key === 'Enter' && !e.shiftKey && !e.metaKey && !e.ctrlKey && !e.altKey) {
            saveSnapshot();
            handleEnterKey(e);
            return;
        }
        // Auto-close pairs
        handleAutoClose(e);
    });

    // Save undo snapshots periodically on normal typing
    var typingTimer = null;
    editArea.addEventListener('beforeinput', function() {
        if (!typingTimer) {
            saveSnapshot();
        }
        clearTimeout(typingTimer);
        typingTimer = setTimeout(function() { typingTimer = null; }, 500);
    });

    readerEl.addEventListener('dblclick', function(){sendToSwift('requestEdit');});
    document.addEventListener('keydown', function(e) {
        if (e.key==='Escape' && currentMode==='edit') sendToSwift('requestRead');
    });

    // Toggle wrapper: if selection is already wrapped with prefix/suffix, remove them; otherwise add them
    function toggleWrap(prefix, suffix) {
        saveSnapshot();
        var ta = editArea, val = ta.value;
        var s = ta.selectionStart, end = ta.selectionEnd;
        var sel = val.substring(s, end);
        var pLen = prefix.length, sLen = suffix.length;

        // Check if selection itself is wrapped: **bold** with ** selected as part of it
        if (sel.length >= pLen + sLen && sel.startsWith(prefix) && sel.endsWith(suffix)) {
            // Remove inner wrapping
            ta.setRangeText(sel.substring(pLen, sel.length - sLen), s, end, 'end');
            ta.selectionStart = s;
            ta.selectionEnd = end - pLen - sLen;
            notifyChange();
            return;
        }

        // Check if text AROUND selection is the wrapper
        var before = val.substring(s - pLen, s);
        var after = val.substring(end, end + sLen);
        if (before === prefix && after === suffix) {
            // Remove wrapping around selection
            ta.setRangeText(sel, s - pLen, end + sLen, 'end');
            ta.selectionStart = s - pLen;
            ta.selectionEnd = s - pLen + sel.length;
            notifyChange();
            return;
        }

        // Add wrapping
        ta.setRangeText(prefix + sel + suffix, s, end, 'end');
        ta.selectionStart = s + pLen;
        ta.selectionEnd = s + pLen + sel.length;
        notifyChange();
    }

    // Line prefix toggle: if line already has prefix, remove it; otherwise add it
    function toggleLinePrefix(prefix) {
        saveSnapshot();
        var ta = editArea, val = ta.value;
        var s = ta.selectionStart;
        var lineStart = val.lastIndexOf('\n', s - 1) + 1;
        var lineEnd = val.indexOf('\n', s);
        if (lineEnd === -1) lineEnd = val.length;
        var line = val.substring(lineStart, lineEnd);

        if (line.startsWith(prefix)) {
            // Remove prefix
            ta.setRangeText(line.substring(prefix.length), lineStart, lineEnd, 'end');
        } else {
            // Add prefix
            ta.setRangeText(prefix + line, lineStart, lineEnd, 'end');
        }
        notifyChange();
    }

    toolbarEl.addEventListener('click', function(e) {
        var btn = e.target.closest('button'); if (!btn) return;
        var a = btn.dataset.action;
        editArea.focus();

        if (a === 'bold') { toggleWrap('**', '**'); return; }
        if (a === 'italic') { toggleWrap('*', '*'); return; }
        if (a === 'code') { toggleWrap('`', '`'); return; }
        if (a === 'h1') { toggleLinePrefix('# '); return; }
        if (a === 'h2') { toggleLinePrefix('## '); return; }
        if (a === 'h3') { toggleLinePrefix('### '); return; }
        if (a === 'bullet') { toggleLinePrefix('- '); return; }
        if (a === 'ordered') { toggleLinePrefix('1. '); return; }
        if (a === 'quote') { toggleLinePrefix('> '); return; }

        // Non-toggleable actions
        saveSnapshot();
        var s = editArea.selectionStart, end = editArea.selectionEnd;
        var sel = editArea.value.substring(s, end);
        if (a === 'link') {
            editArea.setRangeText('[' + sel + '](url)', s, end, 'end');
        } else if (a === 'hr') {
            editArea.setRangeText('\n---\n', s, end, 'end');
        }
        notifyChange();
    });

    sendToSwift('ready');
    </script>
</body>
</html>
